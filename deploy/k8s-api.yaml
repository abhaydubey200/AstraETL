apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-api
  labels:
    app: astra-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: astra-api
  template:
    metadata:
      labels:
        app: astra-api
    spec:
      containers:
      - name: astra-api
        image: astraflow/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: astra-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: astra-api-service
spec:
  selector:
    app: astra-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: astra-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: astra-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
