apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: astra-worker
  template:
    metadata:
      labels:
        app: astra-worker
    spec:
      containers:
      - name: astra-worker
        image: astraflow/backend:latest
        command: ["python", "-m", "backend.worker_daemon"]
        envFrom:
        - secretRef:
            name: astra-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: astra-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: astra-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
